<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Independent Houses | HouseHunt</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/category-independent.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#ffffff">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../js/transitions.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <div class="app-container">
        <header class="category-header">
            <button onclick="history.back()" class="back-btn"><i data-lucide="arrow-left"></i></button>
            <h1>Independent Houses</h1>
            <div style="width: 40px;"></div> <!-- Spacer -->
        </header>

        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="Buy">Buy</button>
            <button class="mode-btn" data-mode="Rent">Rent</button>
        </div>

        <div class="search-section">
            <div class="search-bar" style="margin: 0 20px; background: #eee; padding: 10px 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px;">
                <i data-lucide="search" style="width: 18px; color: #666;"></i>
                <input type="text" id="propertySearch" placeholder="Search locality..." style="border: none; background: transparent; outline: none; font-size: 14px; flex: 1;">
            </div>
        </div>

        <div class="content-wrapper">
            <!-- Nearest Section -->
            <div class="nearest-section">
                <div class="section-title">Nearest to you</div>
                <div class="nearest-scroll">
                    <!-- Static demonstration of "Nearest" -->
                    <div class="nearest-card">
                        <img src="https://images.unsplash.com/photo-1580587771525-78b9dba3b914?auto=format&fit=crop&w=400&q=80">
                        <div class="nearest-info">
                            <div class="price">₹ 4.5 Cr</div>
                            <div style="font-size: 12px;">Sector 44, Noida</div>
                        </div>
                    </div>
                    <div class="nearest-card">
                        <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=400&q=80">
                        <div class="nearest-info">
                            <div class="price">₹ 3.2 Cr</div>
                            <div style="font-size: 12px;">Sector 15, Gurgaon</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="results-info" style="margin-bottom: 15px;">
                <span id="resultsCount">Loading...</span>
            </div>
            
            <div id="propertyList" class="bento-grid">
                <!-- Bento cards will be injected here -->
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script type="module" src="../js/category-independent.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
