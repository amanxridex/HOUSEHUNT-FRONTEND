<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile | HouseHunt</title>
    <link rel="stylesheet" href="../css/profile.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0066ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../js/transitions.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="../js/firebase-auth.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="header-top">
                <button class="settings-btn" onclick="window.location.href='settings.html'"><i data-lucide="settings"></i></button>
            </div>
            <div class="user-avatar-container">
                <img src="../assets/profile.png" alt="User Profile" class="avatar" id="profileAvatar" onerror="this.src='../assets/househuntlogo.png'; this.onerror=null;">
                <button class="edit-avatar"><i data-lucide="camera"></i></button>
            </div>
            <h1 class="user-name" id="profileName">Aman Mishra</h1>
            <p class="user-handle" id="userHandle">Premium Member</p>
            <button class="edit-profile-btn" onclick="window.location.href='settings.html'">Edit Profile</button>
        </div>

        <!-- Menu Section -->
        <div class="content-wrapper">
            <div class="menu-group">
                <h3>Account Settings</h3>
                <div class="menu-item" onclick="window.location.href='settings.html'">
                    <div class="icon-box"><i data-lucide="user"></i></div>
                    <span>Personal Information</span>
                    <i data-lucide="chevron-right" class="chevron"></i>
                </div>
                <div class="menu-item" onclick="window.location.href='favorites.html'">
                    <div class="icon-box"><i data-lucide="heart"></i></div>
                    <span>My Favorites</span>
                    <i data-lucide="chevron-right" class="chevron"></i>
                </div>
                <div class="menu-item" onclick="window.location.href='notifications.html'">
                    <div class="icon-box"><i data-lucide="bell"></i></div>
                    <span>Notifications</span>
                    <i data-lucide="chevron-right" class="chevron"></i>
                </div>
            </div>

            <div class="menu-group">
                <h3>Support & Legal</h3>
                <div class="menu-item" onclick="window.location.href='help.html'">
                    <div class="icon-box"><i data-lucide="help-circle"></i></div>
                    <span>Help Center</span>
                    <i data-lucide="chevron-right" class="chevron"></i>
                </div>
                <div class="menu-item" onclick="window.location.href='privacy.html'">
                    <div class="icon-box"><i data-lucide="shield"></i></div>
                    <span>Privacy Policy</span>
                    <i data-lucide="chevron-right" class="chevron"></i>
                </div>
            </div>

            <button class="logout-btn" id="logoutBtn">
                <i data-lucide="log-out"></i>
                Logout
            </button>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="../index.html" class="nav-item">
                <i data-lucide="home"></i>
                <span>Home</span>
            </a>
            <a href="my-properties.html" class="nav-item">
                <i data-lucide="layout-list"></i>
                <span>My Properties</span>
            </a>
            <a href="ai.html" class="nav-item">
                <div class="ai-video-container" style="width: 24px; height: 24px; margin-bottom: 4px; display: flex; align-items: center; justify-content: center;">
                    <video src="../assets/huntai.mp4" autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: contain;"></video>
                </div>
                <span>HuntAI</span>
            </a>
            <a href="messages.html" class="nav-item">
                <i data-lucide="message-square"></i>
                <span>Messages</span>
            </a>
            <a href="profile.html" class="nav-item active">
                <i data-lucide="user"></i>
                <span>More</span>
            </a>
        </nav>
    </div>

    <script>
        lucide.createIcons();

        // Sync User Data
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            if (user.name) document.getElementById('profileName').innerText = user.name;
            if (user.photo) document.getElementById('profileAvatar').src = user.photo;
            if (user.email) document.getElementById('userHandle').innerText = user.email;
        }

        // Logout Logic
        document.getElementById('logoutBtn').onclick = () => {
            if (window.userLogout) {
                window.userLogout();
            } else {
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            }
        };
    </script>
</body>
</html>
