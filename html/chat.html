<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat | HouseHunt</title>
    <link rel="stylesheet" href="../css/chat.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/assets/mainappicon.png">
</head>
<body>
    <h1 class="visually-hidden" style="position: absolute; width: 1px; height: 1px; margin: -1px; padding: 0; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">HouseHunt Secure Chat</h1>

    <div class="app-container">
        <!-- Chat Header -->
        <header class="chat-header">
            <button class="back-btn" onclick="window.history.back()"><i data-lucide="chevron-left"></i></button>
            <div class="user-info">
                <img src="../assets/profile.png" alt="Profile">
                <div>
                    <h3>Rahul Sharma</h3>
                    <p class="status">Online</p>
                </div>
            </div>
            <div class="header-actions">
                <button><i data-lucide="phone"></i></button>
                <button><i data-lucide="more-vertical"></i></button>
            </div>
        </header>

        <!-- Messages Area -->
        <div class="chat-area">
            <div class="date-divider">Today</div>
            
            <div class="msg received">
                <div class="bubble">
                    Is the 3BHK flat still available for visit today?
                    <span class="time">10:45 AM</span>
                </div>
            </div>

            <div class="msg sent">
                <div class="bubble">
                    Yes, Rahul! You can visit between 4 PM to 7 PM. 
                    <span class="time">10:48 AM</span>
                </div>
            </div>

            <div class="msg received">
                <div class="bubble">
                    Great! Please share the exact location or GPS pin.
                    <span class="time">10:50 AM</span>
                </div>
            </div>
        </div>

        <!-- Input Bar -->
        <div class="input-bar">
            <button class="attach-btn"><i data-lucide="plus"></i></button>
            <div class="input-container">
                <input type="text" placeholder="Type a message...">
                <button class="emoji-btn"><i data-lucide="smile"></i></button>
            </div>
            <button class="send-btn"><i data-lucide="send"></i></button>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script src="../js/tracker.js"></script>
</body>
</html>
