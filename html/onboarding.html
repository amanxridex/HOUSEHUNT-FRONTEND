<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Welcome to HouseHunt</title>
    <link rel="stylesheet" href="../css/onboarding.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <div class="app-container">
        <div class="bg-overlay"></div>
        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80" alt="Background" class="bg-img">
        
        <div class="content">
            <div class="logo-box">
                <img src="../assets/househuntlogo.png" alt="Logo">
            </div>
            
            <div class="text-content">
                <h1 class="animate-up">Find Your <br><span>Perfect Home</span></h1>
                <p class="animate-up delay-1">The most premium real estate platform for buying and renting luxury properties.</p>
            </div>
            
            <div class="footer animate-up delay-2">
                <button class="get-started" onclick="window.location.href='../index.html'">
                    Get Started
                    <i data-lucide="arrow-right"></i>
                </button>
                <p class="login-link">Already have an account? <a href="#">Login</a></p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
