<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Commercial Properties | HouseHunt</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/category-commercial.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#ffffff">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../js/transitions.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <div class="app-container">
        <header class="category-header">
            <button onclick="history.back()" class="back-btn"><i data-lucide="arrow-left"></i></button>
            <h1>Commercial</h1>
            <div style="width: 40px;"></div>
        </header>

        <div class="search-section">
            <div class="search-bar">
                <i data-lucide="search"></i>
                <input type="text" id="propertySearch" placeholder="Search Commercial properties...">
            </div>
        </div>

        <div class="content-wrapper">
            <div class="results-info"><span id="resultsCount">Loading...</span></div>
            <div id="propertyList" class="property-grid"></div>
        </div>
    </div>
    <script type="module" src="../js/category-commercial.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
