<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notifications | HouseHunt</title>
    <link rel="stylesheet" href="../css/profile.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .notif-item {
            display: flex;
            gap: 15px;
            padding: 20px;
            border-bottom: 1px solid #eee;
        }
        .notif-icon {
            width: 45px;
            height: 45px;
            background: #0066ff10;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0066ff;
            flex-shrink: 0;
        }
        .notif-info h4 { margin: 0; font-size: 0.95rem; font-weight: 600; color: #111; }
        .notif-info p { margin: 5px 0 0; font-size: 0.85rem; color: #666; }
        .notif-time { font-size: 0.75rem; color: #999; margin-top: 5px; }
    </style>
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <div class="app-container">
        <header class="page-header" style="padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #eee;">
            <button onclick="history.back()" style="background: none; border: none; font-size: 20px; color: #333;"><i data-lucide="arrow-left"></i></button>
            <h1 style="font-size: 1.2rem; font-weight: 600; margin: 0;">Notifications</h1>
        </header>

        <div class="notifications-list">
            <div class="notif-item">
                <div class="notif-icon"><i data-lucide="check-circle"></i></div>
                <div class="notif-info">
                    <h4>Welcome to HouseHunt!</h4>
                    <p>Your profile is now complete. Start searching for your dream home.</p>
                    <div class="notif-time">Just now</div>
                </div>
            </div>
            <div class="notif-item">
                <div class="notif-icon"><i data-lucide="info"></i></div>
                <div class="notif-info">
                    <h4>Verify your email</h4>
                    <p>Please check your inbox to verify your email address for better security.</p>
                    <div class="notif-time">2 hours ago</div>
                </div>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
