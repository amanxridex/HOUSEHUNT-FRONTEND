<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Favorites | HouseHunt</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/profile.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .favorites-container {
            padding: 20px;
            padding-bottom: 100px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state i {
            color: #ddd;
            margin-bottom: 15px;
        }
    </style>
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="page-header" style="padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #eee;">
            <button onclick="history.back()" style="background: none; border: none; font-size: 20px; color: #333;"><i data-lucide="arrow-left"></i></button>
            <h1 style="font-size: 1.2rem; font-weight: 600; margin: 0;">My Favorites</h1>
        </header>

        <div class="favorites-container" id="favoritesGrid">
            <!-- Loading -->
            <div class="empty-state">
                <i data-lucide="loader" class="spin"></i>
                <p>Loading your favorites...</p>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="../index.html" class="nav-item">
                <i data-lucide="home"></i>
                <span>Home</span>
            </a>
            <a href="my-properties.html" class="nav-item">
                <i data-lucide="layout-list"></i>
                <span>My Properties</span>
            </a>
            <a href="ai.html" class="nav-item">
                <div class="ai-video-container" style="width: 23px; height: 23px; display: flex; align-items: center; justify-content: center;">
                    <video src="../assets/huntai.mp4" autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: contain;"></video>
                </div>
                <span>HuntAI</span>
            </a>
            <a href="messages.html" class="nav-item">
                <i data-lucide="message-square"></i>
                <span>Messages</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i data-lucide="user"></i>
                <span>More</span>
            </a>
        </nav>
    </div>

    <script>
        lucide.createIcons();
        
        async function loadFavorites() {
            const container = document.getElementById('favoritesGrid');
            const favorites = JSON.parse(localStorage.getItem('househunt_favorites') || '[]');
            
            if (favorites.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="heart" style="width: 64px; height: 64px;"></i>
                        <h2>No favorites yet</h2>
                        <p>Start exploring properties and save the ones you love!</p>
                        <button onclick="window.location.href='../html/explore.html'" style="margin-top: 20px; padding: 12px 24px; background: #2D68FF; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer;">Explore Now</button>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = '<div class="empty-state"><i data-lucide="loader" class="spin"></i><p>Loading your favorites...</p></div>';
            lucide.createIcons();

            try {
                // Fetch all properties to filter locally
                const response = await fetch('https://backend.househunt.live/api/properties');
                if (!response.ok) throw new Error('Failed to fetch properties');
                const allProps = await response.json();
                
                const favProps = allProps.filter(p => favorites.includes(p.id));

                if (favProps.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i data-lucide="heart" style="width: 64px; height: 64px;"></i>
                            <h2>No favorites yet</h2>
                            <p>Start exploring properties and save the ones you love!</p>
                            <button onclick="window.location.href='../html/explore.html'" style="margin-top: 20px; padding: 12px 24px; background: #2D68FF; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer;">Explore Now</button>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                container.innerHTML = '';
                
                favProps.forEach(prop => {
                    const priceFormatted = '₹ ' + prop.price.toLocaleString('en-IN');
                    const area = prop.details?.area ? `${prop.details.area} Sqft` : (prop.details?.plot_area ? `${prop.details.plot_area} Sqft` : '');
                    const beds = prop.details?.bhk || (prop.details?.beds ? `${prop.details.beds} Beds` : '');
                    const image = prop.images && prop.images.length > 0 ? prop.images[0] : '../assets/househuntlogo.png';
                    const location = prop.location_text || prop.city || 'Unknown Location';

                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.style = 'background: #fff; border-radius: 24px; overflow: hidden; display: flex; margin-bottom: 20px; position: relative; text-decoration: none; box-shadow: 0 10px 25px rgba(0,0,0,0.04); cursor: pointer;';
                    item.onclick = (e) => {
                        if (!e.target.closest('.fav-btn')) {
                            window.location.href = `property-view.html?id=${prop.id}`;
                        }
                    };

                    item.innerHTML = `
                        <img src="${image}" alt="${prop.property_type}" style="width: 110px; height: 110px; object-fit: cover;" onerror="this.src='../assets/househuntlogo.png'; this.onerror=null;">
                        <div class="item-info" style="padding: 16px; flex: 1; min-width: 0;">
                            <div class="item-price" style="font-size: 18px; font-weight: 900; color: #2D68FF;">${priceFormatted}</div>
                            <h3 style="font-size: 15px; font-weight: 800; color: #1A1D1E; margin: 4px 0;">${beds ? beds + ' ' : ''}${prop.property_type}</h3>
                            <p class="item-loc" style="font-size: 12px; color: #6A6D7C; margin-bottom: 8px;">${location}</p>
                            <div class="item-stats" style="font-size: 11px; font-weight: 700; color: #94a3b8;">
                                <span>${prop.intent}</span> • <span>${area}</span>
                            </div>
                        </div>
                        <button class="fav-btn active" data-id="${prop.id}" style="position: absolute; top: 10px; right: 10px; background: none; border: none; cursor: pointer; padding: 8px; z-index: 5;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#2D68FF" stroke="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                        </button>
                    `;
                    container.appendChild(item);
                });

                // Add remove listeners
                document.querySelectorAll('.fav-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const propId = btn.getAttribute('data-id');
                        let favs = JSON.parse(localStorage.getItem('househunt_favorites') || '[]');
                        favs = favs.filter(id => id !== propId);
                        localStorage.setItem('househunt_favorites', JSON.stringify(favs));
                        // Re-render
                        loadFavorites();
                    });
                });

            } catch(e) {
                console.error(e);
                container.innerHTML = '<div class="empty-state"><p>Error loading favorites.</p></div>';
            }
        }

        loadFavorites();
    </script>
    <script src="../js/tracker.js"></script>
</body>
</html>
