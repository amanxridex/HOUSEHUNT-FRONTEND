<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Favorites | HouseHunt</title>
    <link rel="stylesheet" href="../css/favorites.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <button class="back-btn" onclick="window.history.back()"><i data-lucide="chevron-left"></i></button>
            <h1>My Favorites</h1>
            <div class="count">3 Items</div>
        </header>

        <!-- Favorites List -->
        <div class="content-wrapper">
            <!-- Item 1 -->
            <div class="fav-card animate-in">
                <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=400&q=80" alt="Villa">
                <div class="fav-info">
                    <div class="price">₹ 2.40 Cr</div>
                    <h3>Luxury 4BHK Villa</h3>
                    <p><i data-lucide="map-pin"></i> Jaypee Greens, Noida</p>
                </div>
                <button class="remove-btn"><i data-lucide="trash-2"></i></button>
            </div>

            <!-- Item 2 -->
            <div class="fav-card animate-in delay-1">
                <img src="https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=400&q=80" alt="Apartment">
                <div class="fav-info">
                    <div class="price">₹ 85.50 L</div>
                    <h3>Modern 3BHK Apartment</h3>
                    <p><i data-lucide="map-pin"></i> Sector 62, Noida</p>
                </div>
                <button class="remove-btn"><i data-lucide="trash-2"></i></button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="../index.html" class="nav-item">
                <i data-lucide="home"></i>
                <span>Home</span>
            </a>
            <a href="my-properties.html" class="nav-item">
                <i data-lucide="layout-list"></i>
                <span>My Properties</span>
            </a>
            <a href="messages.html" class="nav-item">
                <i data-lucide="message-square"></i>
                <span>Messages</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i data-lucide="user"></i>
                <span>More</span>
            </a>
        </nav>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
