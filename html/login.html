<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HouseHunt</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0066ff">
    <script type="module" src="../js/auth-guard.js"></script>
    <style>
        .login-screen {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 25px;
            color: white;
        }
        .login-content {
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .login-content h1 { font-size: 38px; font-weight: 800; line-height: 1.1; margin-bottom: 15px; }
        .login-content p { font-size: 16px; opacity: 0.9; margin-bottom: 40px; line-height: 1.5; }
        
        .google-btn {
            background: white;
            color: #111;
            padding: 18px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            border: none;
            width: 100%;
            transition: transform 0.2s;
        }
        .google-btn:active { transform: scale(0.98); }
        .google-btn img { width: 24px; }
        
        .skip-btn {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            opacity: 0.7;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js').then(reg => {
                    console.log('SW Registered!', reg);
                }).catch(err => {
                    console.log('SW Registration Failed', err);
                });
            });
        }
    </script>
    <div class="app-container">
        <div class="login-screen">
            <div class="login-content">
                <h1>Find Your<br>Dream Home<br>Today.</h1>
                <p>Join thousands of happy homeowners finding their perfect space with HouseHunt.</p>
                
                <button class="google-btn" onclick="signInWithGoogle()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    Continue with Google
                </button>
                
                <div class="skip-btn" onclick="window.location.href='../index.html'">Skip for now</div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/firebase-auth.js"></script>
</body>
</html>
