<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HuntAI Under Construction | HouseHunt</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/ai.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .error-container {
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
        }
        .ai-bot-container {
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
            position: relative;
        }
        .ai-bot-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0, 102, 255, 0.3);
        }
        .construction-badge {
            background: #ff9500;
            color: white;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #111, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 300px;
        }
        .action-btn {
            background: #0066ff;
            color: white;
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.3);
            transition: transform 0.3s ease;
        }
        .action-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="ai-header" style="justify-content: flex-start; padding: 20px;">
            <button onclick="window.location.href='../index.html'" class="back-btn"><i data-lucide="arrow-left"></i></button>
        </header>

        <div class="error-container">
            <div class="ai-bot-container">
                <video src="../assets/huntai.mp4" autoplay loop muted playsinline></video>
            </div>
            
            <div class="construction-badge">Coming Soon</div>
            <h1>HuntAI is Learning</h1>
            <p>Our engineers are currently working on fine-tuning the HuntAI engine to give you the best experience.</p>
            
            <a href="explore.html" class="action-btn">
                <i data-lucide="search"></i>
                Search Properties Manually
            </a>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="../index.html" class="nav-item">
                <i data-lucide="home"></i>
                <span>Home</span>
            </a>
            <a href="my-properties.html" class="nav-item">
                <i data-lucide="layout-list"></i>
                <span>My Properties</span>
            </a>
            <a href="404ai.html" class="nav-item active">
                <div class="ai-video-container" style="width: 23px; height: 23px; display: flex; align-items: center; justify-content: center;">
                    <video src="../assets/huntai.mp4" autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: contain;"></video>
                </div>
                <span>HuntAI</span>
            </a>
            <a href="messages.html" class="nav-item">
                <i data-lucide="message-square"></i>
                <span>Messages</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i data-lucide="user"></i>
                <span>More</span>
            </a>
        </nav>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
