<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Properties | HouseHunt</title>
    <link rel="stylesheet" href="../css/my-properties.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>My Properties</h1>
            <p>Manage your listings and leads</p>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active">Active (2)</div>
            <div class="tab">Pending</div>
            <div class="tab">Archived</div>
        </div>

        <!-- Property List -->
        <div class="content-wrapper">
            <!-- Property Card 1 -->
            <div class="property-card">
                <div class="card-img-container">
                    <img src="../assets/house.png" alt="Property">
                    <div class="status-badge active">Live</div>
                </div>
                <div class="card-info">
                    <div class="price">₹ 85.50 L</div>
                    <h3>Modern 3BHK Apartment</h3>
                    <p class="loc"><i data-lucide="map-pin"></i> Sector 62, Noida</p>
                    <div class="stats">
                        <span><i data-lucide="eye"></i> 124 Views</span>
                        <span><i data-lucide="message-circle"></i> 8 Leads</span>
                    </div>
                </div>
                <div class="card-actions">
                    <button class="edit-btn">Edit</button>
                    <button class="more-btn"><i data-lucide="more-vertical"></i></button>
                </div>
            </div>

            <!-- Property Card 2 -->
            <div class="property-card">
                <div class="card-img-container">
                    <img src="../assets/house.png" alt="Property">
                    <div class="status-badge active">Live</div>
                </div>
                <div class="card-info">
                    <div class="price">₹ 45.00 L</div>
                    <h3>Commercial Shop/Office</h3>
                    <p class="loc"><i data-lucide="map-pin"></i> Greater Noida</p>
                    <div class="stats">
                        <span><i data-lucide="eye"></i> 45 Views</span>
                        <span><i data-lucide="message-circle"></i> 2 Leads</span>
                    </div>
                </div>
                <div class="card-actions">
                    <button class="edit-btn">Edit</button>
                    <button class="more-btn"><i data-lucide="more-vertical"></i></button>
                </div>
            </div>
        </div>

        <!-- Floating Post Button -->
        <a href="hosttype.html" class="floating-add">
            <i data-lucide="plus"></i>
        </a>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="../index.html" class="nav-item">
                <i data-lucide="home"></i>
                <span>Home</span>
            </a>
            <a href="my-properties.html" class="nav-item active">
                <i data-lucide="layout-list"></i>
                <span>My Properties</span>
            </a>
            <a href="messages.html" class="nav-item">
                <i data-lucide="message-square"></i>
                <span>Messages</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i data-lucide="user"></i>
                <span>More</span>
            </a>
        </nav>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
