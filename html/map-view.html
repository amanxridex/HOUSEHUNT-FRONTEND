<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Map View | HouseHunt</title>
    <link rel="stylesheet" href="../css/map-view.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <h1 class="visually-hidden" style="position: absolute; width: 1px; height: 1px; margin: -1px; padding: 0; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">HouseHunt Map View</h1>

    <div class="app-container">
        <!-- Map Overlay Header -->
        <header class="map-header">
            <button class="back-btn" onclick="window.history.back()"><i data-lucide="chevron-left"></i></button>
            <div class="search-pill">
                <i data-lucide="search"></i>
                <input type="text" placeholder="Search in Noida...">
            </div>
            <button class="filter-btn"><i data-lucide="sliders-horizontal"></i></button>
        </header>

        <!-- Mock Map Background -->
        <div class="map-area">
            <!-- Mock Markers -->
            <div class="marker" style="top: 30%; left: 40%;">₹ 85L</div>
            <div class="marker active" style="top: 45%; left: 60%;">₹ 2.4Cr</div>
            <div class="marker" style="top: 20%; left: 20%;">₹ 1.2Cr</div>
            <div class="marker" style="top: 60%; left: 30%;">₹ 45L</div>
        </div>

        <!-- Floating Card -->
        <div class="property-preview">
            <div class="preview-card">
                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=300&q=80" alt="Villa">
                <div class="preview-info">
                    <div class="price">₹ 2.40 Cr</div>
                    <h3>Premium 4BHK Villa</h3>
                    <p><i data-lucide="map-pin"></i> Jaypee Greens, Noida</p>
                </div>
                <button class="go-btn"><i data-lucide="arrow-right"></i></button>
            </div>
        </div>

        <!-- Bottom Navigation -->
                <nav class="bottom-nav">
            <a href="../index.html" class="nav-item">
                <i data-lucide="home"></i>
                <span>Home</span>
            </a>
            <a href="my-properties.html" class="nav-item">
                <i data-lucide="layout-list"></i>
                <span>My Properties</span>
            </a>
            <a href="ai.html" class="nav-item">
                <div class="ai-video-container" style="width: 23px; height: 23px; display: flex; align-items: center; justify-content: center;">
                    <video src="../assets/huntai.mp4" autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: contain;"></video>
                </div>
                <span>HuntAI</span>
            </a>
            <a href="messages.html" class="nav-item">
                <i data-lucide="message-square"></i>
                <span>Messages</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i data-lucide="user"></i>
                <span>More</span>
            </a>
        </nav>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script src="../js/tracker.js"></script>
</body>
</html>
